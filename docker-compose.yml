services:
  # --- DATABASE ---
  db:
    image: postgres:16-alpine
    container_name: justmakeit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- MINIO (STORAGE) ---
  # minio:
  #   image: minio/minio
  #   container_name: justmakeit-minio
  #   restart: unless-stopped
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  #   command: server /data --console-address ":9001"
  #   volumes:
  #     - minio_data:/data

  # --- AI (OLLAMA) ---
  # ollama:
  #   image: ollama/ollama
  #   container_name: justmakeit-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  # --- GATEWAY (TRAEFIK) ---
  traefik:
    image: traefik:v3.0
    container_name: justmakeit-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  minio_data:
  ollama_data:
