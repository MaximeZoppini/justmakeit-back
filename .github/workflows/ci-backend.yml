name: CI Backend

on:
    push:
        branches:
            - develop
            - main
    pull_request:
        branches:
            - main

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install system dependencies (FFmpeg)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ffmpeg

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'maven'

            - name: Run Static Analysis (Checkstyle & SpotBugs)
              run: ./mvnw checkstyle:check spotbugs:check

            - name: Run Tests and Build with Maven
              run: ./mvnw clean verify jacoco:report

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: jacoco-report
                  path: target/site/jacoco/
